  <style>
    :root {
      --black:   #090907;
      --card-bg: #0f0e0b;
      --gold:    #c9a84c;
      --gold2:   #e8cc7a;
      --gold3:   #f5e2a8;
      --dim:     #5a5440;
      --line:    rgba(201,168,76,0.18);
      --text:    #f0ead6;
      --radius:  4px;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Cairo', sans-serif;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
    }

    /* subtle grain */
    body::before {
      content: '';
      position: fixed; inset: 0; z-index: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.035;
      pointer-events: none;
    }

    /* ─── CARD ──────────────────────────────── */
    .card {
      position: relative; z-index: 1;
      background: var(--card-bg);
      border: 1px solid var(--line);
      width: 100%;
      max-width: 380px;          /* mobile */
      padding: 3rem 2.4rem 2.4rem;
      animation: appear .7s ease both;
    }

    /* desktop: wider card */
    @media (min-width: 600px) {
      .card { max-width: 520px; padding: 3.5rem 3.2rem 3rem; }
    }

    /* corner ornaments */
    .card::before, .card::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--gold);
      border-style: solid;
    }
    .card::before { top: 12px; right: 12px; border-width: 1px 1px 0 0; }
    .card::after  { bottom: 12px; left: 12px; border-width: 0 0 1px 1px; }

    /* extra corners via pseudo on inner wrapper */
    .card-inner::before, .card-inner::after {
      content: '';
      position: absolute;
      width: 18px; height: 18px;
      border-color: var(--gold);
      border-style: solid;
    }
    .card-inner::before { top: 12px; left: 12px; border-width: 1px 0 0 1px; }
    .card-inner::after  { bottom: 12px; right: 12px; border-width: 0 1px 1px 0; }

    .card-inner { position: relative; }

    @keyframes appear {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ─── TOP ROW ───────────────────────────── */
    .top-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 2rem;
    }

    .monogram {
      width: 58px; height: 58px;
      border: 1px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 1.7rem; font-weight: 700;
      color: var(--gold2);
      flex-shrink: 0;
      position: relative;
    }
    /* inner shadow glow */
    .monogram::after {
      content: '';
      position: absolute; inset: 3px;
      border: 1px solid rgba(201,168,76,0.12);
    }

    @media (min-width: 600px) {
      .monogram { width: 70px; height: 70px; font-size: 2rem; }
    }

    .title-block { text-align: left; }

    .name {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 700;
      letter-spacing: 3px;
      color: var(--gold3);
      line-height: 1;
      text-transform: uppercase;
    }
    .name-ar {
      font-size: 0.78rem;
      color: var(--dim);
      font-weight: 300;
      letter-spacing: 2px;
      margin-top: 0.3rem;
    }

    /* ─── DIVIDER ───────────────────────────── */
    .divider {
      display: flex; align-items: center; gap: 0.8rem;
      margin: 0 0 1.8rem;
    }
    .divider-line { flex: 1; height: 1px; background: var(--line); }
    .divider-diamond {
      width: 5px; height: 5px;
      background: var(--gold);
      transform: rotate(45deg);
      flex-shrink: 0;
    }

    /* ─── ROLE TAG ───────────────────────────── */
    .role {
      font-size: 0.62rem;
      color: var(--gold);
      letter-spacing: 3px;
      text-transform: uppercase;
      font-weight: 500;
      margin-bottom: 2rem;
      text-align: center;
    }

    /* ─── LINKS ─────────────────────────────── */
    .links { display: flex; flex-direction: column; gap: 0; }

    .link-row {
      display: flex; align-items: center;
      gap: 1rem;
      padding: 0.9rem 0;
      border-bottom: 1px solid var(--line);
      text-decoration: none;
      color: var(--text);
      transition: padding-right 0.2s;
      animation: rowIn 0.5s ease both;
    }
    .link-row:last-child { border-bottom: none; }
    .link-row:hover { padding-right: 6px; }
    .link-row:hover .link-platform { color: var(--gold2); }
    .link-row:hover .link-arrow { color: var(--gold); opacity: 1; }

    .link-row:nth-child(1) { animation-delay: 0.15s; }
    .link-row:nth-child(2) { animation-delay: 0.25s; }
    .link-row:nth-child(3) { animation-delay: 0.35s; }

    @keyframes rowIn {
      from { opacity: 0; transform: translateX(12px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .link-icon {
      width: 36px; height: 36px;
      border: 1px solid var(--line);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      transition: border-color 0.2s;
    }
    .link-row:hover .link-icon { border-color: rgba(201,168,76,0.4); }
    .link-icon svg { width: 16px; height: 16px; fill: var(--gold); }

    .link-text { flex: 1; }
    .link-platform {
      font-size: 0.6rem;
      color: var(--dim);
      letter-spacing: 2px;
      text-transform: uppercase;
      font-weight: 400;
      transition: color 0.2s;
    }
    .link-handle {
      font-size: 0.88rem;
      color: var(--text);
      font-weight: 500;
      margin-top: 0.1rem;
    }
    .link-arrow {
      color: var(--dim);
      font-size: 0.75rem;
      opacity: 0.5;
      transition: color 0.2s, opacity 0.2s;
    }

    /* ─── FOOTER ────────────────────────────── */
    .card-footer {
      margin-top: 2rem;
      text-align: center;
      font-size: 0.58rem;
      color: var(--dim);
      letter-spacing: 2.5px;
      text-transform: uppercase;
    }
  </style>
</head>
